name: Deploy GitHub Runner

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/**"

jobs:
  terraform:
    name: Provision VM
    runs-on: ubuntu-latest
    environment: production

    outputs:
      vm_ip: ${{ steps.tf_output.outputs.vm_ip }}

    env:
      # Non-sensitive — Actions Variables in the production environment
      TF_VAR_proxmox_endpoint: ${{ vars.PROXMOX_ENDPOINT }}
      TF_VAR_proxmox_node: ${{ vars.PROXMOX_NODE }}
      TF_VAR_proxmox_datastore: ${{ vars.PROXMOX_DATASTORE }}
      TF_VAR_proxmox_bridge: ${{ vars.PROXMOX_BRIDGE }}
      TF_VAR_vm_name: ${{ vars.VM_NAME }}
      TF_VAR_vm_ip_cidr: ${{ vars.VM_IP_CIDR }}
      TF_VAR_vm_gateway: ${{ vars.VM_GATEWAY }}
      TF_VAR_proxmox_ssh_host: ${{ vars.PVE_SSH_HOST }}
      TF_VAR_proxmox_ssh_port: ${{ vars.PVE_SSH_PORT }}
      # Sensitive — Actions Secrets in the production environment
      TF_VAR_proxmox_api_token_id: ${{ secrets.PROXMOX_API_TOKEN_ID }}
      TF_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_API_TOKEN_SECRET }}
      TF_VAR_vm_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent (PVE root key for disk import)
        run: |
          mkdir -p ~/.ssh
          eval "$(ssh-agent -s)"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" | ssh-add -
          ssh-keyscan -p ${{ vars.PVE_SSH_PORT }} -H ${{ vars.PVE_SSH_HOST }} >> ~/.ssh/known_hosts
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Capture VM IP
        id: tf_output
        working-directory: terraform
        run: |
          VM_IP=$(terraform output -raw vm_ipv4_address)
          echo "vm_ip=${VM_IP}" >> "$GITHUB_OUTPUT"

  ansible:
    name: Configure runner
    runs-on: ubuntu-latest
    environment: production
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        run: |
          mkdir -p ~/.ssh
          eval "$(ssh-agent -s)"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" | ssh-add -
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" | ssh-add -
          ssh-keyscan -p ${{ vars.PVE_SSH_PORT }} -H ${{ vars.PVE_SSH_HOST }} >> ~/.ssh/known_hosts
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Write Ansible inventory
        run: |
          printf '[runners]\n%s ansible_ssh_common_args="-o ProxyJump=root@%s:%s -o StrictHostKeyChecking=no"\n' \
            "${{ needs.terraform.outputs.vm_ip }}" \
            "${{ vars.PVE_SSH_HOST }}" \
            "${{ vars.PVE_SSH_PORT }}" > ansible/inventory.ini

      - name: Wait for SSH via PVE jump host
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -J root@${{ vars.PVE_SSH_HOST }}:${{ vars.PVE_SSH_PORT }} \
              debian@${{ needs.terraform.outputs.vm_ip }} true && break
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible playbook
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbooks/github-runner.yml \
            --extra-vars "gh_org=${{ github.repository_owner }} gh_token=${GH_TOKEN}"
